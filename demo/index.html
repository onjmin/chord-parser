<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>@onjmin/chord-parser demo</title>
<style>
	:root {
		--bg: #0f1115;
		--panel: #1a1d24;
		--border: #2c313c;
		--fg: #e6e8ec;
		--muted: #8b93a1;
		--accent: #6ea8fe;
		--accent2: #6effc1;
		--accent3: #ffd479;
		--key-w: #f4f5f7;
		--key-b: #20242c;
		--lit: #6ea8fe;
	}
	* { box-sizing: border-box; }
	body {
		margin: 0;
		background: var(--bg);
		color: var(--fg);
		font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
		line-height: 1.6;
		padding: 24px 16px 64px;
	}
	.wrap { max-width: 760px; margin: 0 auto; }
	h1 { font-size: 22px; margin: 0 0 4px; }
	.sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
	.panel {
		background: var(--panel);
		border: 1px solid var(--border);
		border-radius: 12px;
		padding: 18px;
		margin-bottom: 20px;
	}
	.panel h2 { font-size: 15px; margin: 0 0 12px; color: var(--accent); }
	.panel.b h2 { color: var(--accent2); }
	.panel.c h2 { color: var(--accent3); }
	label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
	input[type="text"] {
		width: 100%;
		background: #0f1115;
		border: 1px solid var(--border);
		border-radius: 8px;
		color: var(--fg);
		font-size: 16px;
		padding: 10px 12px;
		font-family: ui-monospace, monospace;
	}
	input:focus { outline: none; border-color: var(--accent); }
	.chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
	.chip {
		font: 12px ui-monospace, monospace;
		background: #232833;
		border: 1px solid var(--border);
		border-radius: 999px;
		padding: 3px 10px;
		cursor: pointer;
		color: var(--muted);
	}
	.chip:hover { color: var(--fg); border-color: var(--accent); }
	.out { margin-top: 14px; font-size: 14px; }
	.out code { font-family: ui-monospace, monospace; color: var(--accent2); }
	.cands { list-style: none; padding: 0; margin: 8px 0 0; }
	.cands li {
		padding: 6px 10px;
		border-radius: 8px;
		display: flex;
		gap: 10px;
		align-items: baseline;
	}
	.cands li:first-child { background: #232833; }
	.cands .sym { font: 16px ui-monospace, monospace; color: var(--accent2); min-width: 90px; }
	.cands .meta { color: var(--muted); font-size: 12px; }
	.err { color: #ff8a8a; font-size: 13px; }
	/* keyboard */
	.piano { position: relative; height: 90px; margin-top: 14px; user-select: none; }
	.wkey, .bkey {
		position: absolute; top: 0; cursor: pointer; border: 1px solid #000;
		border-radius: 0 0 4px 4px;
	}
	.wkey { background: var(--key-w); height: 90px; }
	.bkey { background: var(--key-b); height: 56px; z-index: 2; }
	.wkey.lit { background: var(--lit); }
	.bkey.lit { background: var(--accent); }
	.foot { color: var(--muted); font-size: 12px; text-align: center; margin-top: 30px; }
	a { color: var(--accent); }
	/* progression timeline */
	.field { display: flex; gap: 16px; align-items: flex-end; margin-bottom: 4px; }
	.field > div { flex: 1; }
	.field .narrow { flex: 0 0 90px; }
	input[type="number"] {
		width: 100%;
		background: #0f1115;
		border: 1px solid var(--border);
		border-radius: 8px;
		color: var(--fg);
		font-size: 16px;
		padding: 10px 12px;
		font-family: ui-monospace, monospace;
	}
	input[type="number"]:focus { outline: none; border-color: var(--accent3); }
	.drop {
		display: flex; align-items: center; justify-content: center;
		text-align: center; cursor: pointer;
		border: 1px dashed var(--border); border-radius: 10px;
		padding: 22px 12px; color: var(--muted); font-size: 13px;
		background: #0f1115; transition: border-color .15s, color .15s, background .15s;
	}
	.drop:hover, .drop.over { border-color: var(--accent3); color: var(--fg); background: #14171e; }
	.midiInfo { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 0; }
	.midiInfo code { color: var(--accent3); font-family: ui-monospace, monospace; }
	.orline {
		display: flex; align-items: center; gap: 10px;
		color: var(--muted); font-size: 11px; margin: 18px 0 4px;
	}
	.orline::before, .orline::after {
		content: ""; flex: 1; height: 1px; background: var(--border);
	}
	.tl-label { font-size: 11px; color: var(--muted); margin: 14px 0 5px; }
	.band-wrapper {
		width: 100%;
		overflow-x: auto;
		background: #0f1115;
		border-radius: 8px;
		border: 1px solid var(--border);
		padding: 4px;
		margin-bottom: 8px;
	}
	.band {
		display: flex;
		gap: 3px;
		align-items: stretch;
		min-width: 100%;
	}
	.kseg, .cseg {
		min-width: 60px;
		text-align: center;
		border: 1px solid var(--border); border-radius: 6px; padding: 6px 3px;
		white-space: nowrap;
	}
	.kseg { background: #2a2418; }
	.kseg .kn { font: 13px ui-monospace, monospace; color: var(--accent3); }
	.kseg .kt { font-size: 10px; color: var(--muted); }
	.cseg { background: #1d2330; }
	.cseg .cs { font: 14px ui-monospace, monospace; color: var(--accent2); }
	.cseg .cd { font-size: 11px; color: var(--accent); }
	.cseg .ct { font-size: 10px; color: var(--muted); }

	/* 詳細テーブル */
	.detail-table-wrapper {
		max-height: 280px;
		overflow-y: auto;
		border: 1px solid var(--border);
		border-radius: 8px;
		background: #0f1115;
		margin-top: 8px;
	}
	.detail-table {
		width: 100%;
		border-collapse: collapse;
		font-size: 13px;
		text-align: left;
	}
	.detail-table th, .detail-table td {
		padding: 8px 12px;
		border-bottom: 1px solid var(--border);
	}
	.detail-table th {
		background: #1a1d24;
		color: var(--muted);
		font-weight: 600;
		position: sticky;
		top: 0;
		z-index: 10;
	}
	.detail-table tr:hover {
		background: #1d2330;
	}
	.detail-table td.time {
		font-family: ui-monospace, monospace;
		color: var(--accent3);
	}
	.detail-table td.chord {
		font-family: ui-monospace, monospace;
		font-weight: bold;
		color: var(--accent2);
	}
	.detail-table td.key {
		font-family: ui-monospace, monospace;
		color: var(--accent3);
	}
	.detail-table td.degree {
		font-family: ui-monospace, monospace;
		color: var(--accent);
	}
	.detail-table td.dur {
		color: var(--muted);
	}
</style>
</head>
<body>
<div class="wrap">
	<h1>@onjmin/chord-parser</h1>
	<p class="sub">コードネーム（chord symbol）⇄ 構成音（chord tones）を相互変換するデモ</p>

	<!-- (A) -->
	<div class="panel a">
		<h2>(A) コードネーム → 構成音 &nbsp;<code style="color:var(--muted)">parseChord</code></h2>
		<label for="symIn">コードネームを入力</label>
		<input id="symIn" type="text" value="Cmaj7" autocomplete="off" spellcheck="false" />
		<div class="chips" id="symChips"></div>
		<div class="piano" id="pianoA"></div>
		<div class="out" id="symOut"></div>
	</div>

	<!-- (B) -->
	<div class="panel b">
		<h2>(B) 構成音 → コードネーム &nbsp;<code style="color:var(--muted)">detectChord</code></h2>
		<label for="noteIn">構成音を入力（カンマ区切り。pitch class 0〜11 / MIDI どちらでも可）</label>
		<input id="noteIn" type="text" value="0, 4, 7, 11" autocomplete="off" spellcheck="false" />
		<div class="chips" id="noteChips"></div>
		<div class="piano" id="pianoB"></div>
		<div class="out" id="noteOut"></div>
	</div>

	<!-- (C) -->
	<div class="panel c">
		<h2>(C) 任意のMIDI → 時間軸コード進行＋キー推定 &nbsp;<code style="color:var(--muted)">detectProgression</code></h2>
		<label>MIDIファイルを読み込む（曲全体のノートからキー・転調・コード進行を推定）</label>
		<label class="drop" id="midiDrop" for="midiIn">
			<input id="midiIn" type="file" accept=".mid,.midi" hidden />
			<span id="midiLabel">.mid / .midi をドラッグ＆ドロップ、またはクリックして選択</span>
		</label>
		<div class="midiInfo" id="midiInfo"></div>

		<div class="orline"><span>または コード進行を直接入力</span></div>
		<div class="field">
			<div>
				<label for="progIn">コード進行（<code>|</code> で小節区切り、転調も検出）</label>
				<input id="progIn" type="text" value="C | G | Am | F | C | G | F | C | C | G | Am | F | C | G | F | C" autocomplete="off" spellcheck="false" />
			</div>
			<div class="narrow">
				<label for="bpmIn">BPM</label>
				<input id="bpmIn" type="number" value="120" min="20" max="400" />
			</div>
		</div>
		<div class="chips" id="progChips"></div>
		<div class="out" id="progOut"></div>
	</div>

	<p class="foot">
		MIT License ·
		<a href="https://github.com/onjmin/chord-parser">GitHub</a> ·
		<a href="../">API docs</a>
	</p>
</div>

<script type="module">
	import MidiParser from "https://cdn.jsdelivr.net/npm/midi-parser-js@4.0.4/+esm";
	const isLocal = ["localhost", "127.0.0.1"].includes(location.hostname);
	const {
		parseChord, detectChord, noteName,
		parseChords, chordEventsToNotes, detectProgression,
	} = await import(
		isLocal ? "http://localhost:40299/dist/index.mjs" : "./index.mjs"
	);

	// ----- piano keyboard renderer (2 octaves) -----
	const WHITE = [0, 2, 4, 5, 7, 9, 11];
	const BLACK = [1, 3, 6, 8, 10];
	const OCTAVES = 2;
	function buildPiano(el) {
		el.innerHTML = "";
		const whiteCount = 7 * OCTAVES;
		const ww = 100 / whiteCount;
		const keys = new Map(); // pc(0..) -> [elements]
		const add = (pc, node) => {
			const k = ((pc % 12) + 12) % 12;
			if (!keys.has(k)) keys.set(k, []);
			keys.get(k).push(node);
		};
		let wi = 0;
		for (let o = 0; o < OCTAVES; o++) {
			for (const pc of WHITE) {
				const k = document.createElement("div");
				k.className = "wkey";
				k.style.left = `${wi * ww}%`;
				k.style.width = `${ww}%`;
				el.appendChild(k);
				add(o * 12 + pc, k);
				wi++;
			}
		}
		// black keys positioned relative to white index
		const blackAfterWhite = { 1: 0, 3: 1, 6: 3, 8: 4, 10: 5 };
		for (let o = 0; o < OCTAVES; o++) {
			for (const pc of BLACK) {
				const baseWhite = o * 7 + blackAfterWhite[pc];
				const k = document.createElement("div");
				k.className = "bkey";
				k.style.left = `${(baseWhite + 1) * ww - ww * 0.3}%`;
				k.style.width = `${ww * 0.6}%`;
				el.appendChild(k);
				add(o * 12 + pc, k);
			}
		}
		return keys;
	}
	function light(keys, pcs) {
		for (const arr of keys.values())
			for (const n of arr) n.classList.remove("lit");
		for (const pc of pcs) {
			const arr = keys.get(((pc % 12) + 12) % 12);
			if (arr) for (const n of arr) n.classList.add("lit");
		}
	}

	const keysA = buildPiano(document.getElementById("pianoA"));
	const keysB = buildPiano(document.getElementById("pianoB"));

	// ----- (A) parseChord -----
	const symIn = document.getElementById("symIn");
	const symOut = document.getElementById("symOut");
	function runA() {
		try {
			const r = parseChord(symIn.value.trim());
			const names = r.pitchClasses.map((p) => noteName(p)).join(", ");
			symOut.innerHTML =
				`root: <code>${noteName(r.root)}</code> &nbsp; ` +
				`notes: <code>[${r.notes.join(", ")}]</code><br>` +
				`構成音: <code>${names}</code>`;
			light(keysA, r.pitchClasses);
		} catch (e) {
			symOut.innerHTML = `<span class="err">${e.message.split("\n")[0]}</span>`;
			light(keysA, []);
		}
	}
	symIn.addEventListener("input", runA);
	for (const s of ["C", "Am7", "G7", "FM7", "Dm7b5", "Csus4", "C/E", "G7sus4", "Cadd9"]) {
		const c = document.createElement("span");
		c.className = "chip";
		c.textContent = s;
		c.onclick = () => { symIn.value = s; runA(); };
		document.getElementById("symChips").appendChild(c);
	}

	// ----- (B) detectChord -----
	const noteIn = document.getElementById("noteIn");
	const noteOut = document.getElementById("noteOut");
	function runB() {
		const notes = noteIn.value
			.split(/[\s,]+/)
			.filter((v) => v !== "")
			.map(Number)
			.filter((n) => Number.isFinite(n));
		light(keysB, notes);
		const cands = detectChord(notes);
		if (!cands.length) {
			noteOut.innerHTML = `<span class="err">一致するコードが見つかりません</span>`;
			return;
		}
		const items = cands
			.slice(0, 6)
			.map(
				(c) =>
					`<li><span class="sym">${c.symbol}</span>` +
					`<span class="meta">root ${noteName(c.root)} / ${c.inversion ? "転回形" : "基本形"}</span></li>`,
			)
			.join("");
		noteOut.innerHTML = `<ul class="cands">${items}</ul>`;
	}
	noteIn.addEventListener("input", runB);
	for (const s of ["0,4,7", "0,4,7,11", "2,5,9,0", "60,64,67,71", "4,7,12", "0,3,6,9"]) {
		const c = document.createElement("span");
		c.className = "chip";
		c.textContent = s;
		c.onclick = () => { noteIn.value = s; runB(); };
		document.getElementById("noteChips").appendChild(c);
	}

	// ----- (C) detectProgression -----
	const progIn = document.getElementById("progIn");
	const bpmIn = document.getElementById("bpmIn");
	const progOut = document.getElementById("progOut");
	const midiIn = document.getElementById("midiIn");
	const midiDrop = document.getElementById("midiDrop");
	const midiLabel = document.getElementById("midiLabel");
	const midiInfo = document.getElementById("midiInfo");
	const fmt = (s) => (Math.round(s * 10) / 10).toString();

	// midi-parser-js を利用して、絶対秒の TimedNote[] に変換する。
	function parseMidi(buf) {
		const midi = MidiParser.parse(new Uint8Array(buf));
		const division = midi.timeDivision;
		if (!division) throw new Error("MIDIの division 情報が見つかりません");
		if (division & 0x8000) throw new Error("SMPTEタイムコードのMIDIは未対応です");

		const tempos = []; // { tick, us }
		const raw = []; // { s, e, note }
		for (const trk of midi.track) {
			let tick = 0;
			const pending = {}; // (ch<<8|note) -> startTick
			for (const event of trk.event) {
				tick += event.deltaTime;
				if (event.type === 0xff && event.metaType === 0x51) {
					let us;
					if (typeof event.data === "number") {
						us = event.data;
					} else {
						us = (event.data[0] << 16) | (event.data[1] << 8) | event.data[2];
					}
					tempos.push({ tick, us });
				} else if (event.type === 9) { // Note On
					const note = event.data[0];
					const vel = event.data[1];
					const ch = event.channel ?? 0;
					if (ch === 9) continue; // ドラムトラックは除外
					const k = (ch << 8) | note;
					if (vel > 0) {
						pending[k] = tick;
					} else if (pending[k] != null) {
						raw.push({ s: pending[k], e: tick, note });
						delete pending[k];
					}
				} else if (event.type === 8) { // Note Off
					const note = event.data[0];
					const ch = event.channel ?? 0;
					if (ch === 9) continue; // ドラムトラックは除外
					const k = (ch << 8) | note;
					if (pending[k] != null) {
						raw.push({ s: pending[k], e: tick, note });
						delete pending[k];
					}
				}
			}
			for (const k in pending) {
				raw.push({ s: pending[k], e: tick, note: k & 0xff });
			}
		}

		if (!tempos.length || tempos[0].tick > 0) tempos.unshift({ tick: 0, us: 500000 });
		tempos.sort((a, b) => a.tick - b.tick);
		const tickToSec = (tk) => {
			let sec = 0, last = 0, us = tempos[0].us;
			for (const c of tempos) {
				if (c.tick > tk) break;
				sec += ((c.tick - last) * us) / division / 1e6;
				last = c.tick;
				us = c.us;
			}
			return sec + ((tk - last) * us) / division / 1e6;
		};

		const notes = [];
		for (const r of raw) {
			const s = tickToSec(r.s), e = tickToSec(r.e);
			if (e > s) notes.push({ pitch: r.note, when: s, duration: e - s });
		}
		notes.sort((a, b) => a.when - b.when);
		const bpm = Math.round(60000000 / tempos[0].us);
		return { notes, bpm };
	}

	function renderTimeline(analysis) {
		const { keys, chords } = analysis;
		if (!chords.length) {
			progOut.innerHTML = `<span class="err">コードを検出できませんでした</span>`;
			return;
		}

		// 曲全体の長さ（秒）を見積もる。タイムライン全体のフレックス比の目安にする
		const totalDuration = Math.max(
			...chords.map(c => c.when + c.duration),
			...keys.map(k => k.when + k.duration),
			1
		);

		// 横幅（ピクセル）を曲の長さに応じて動的に設定（1秒あたり15px、最低800px）
		const bandWidth = Math.max(800, Math.round(totalDuration * 15));

		const keyBand = keys
			.map(
				(k) =>
					`<div class="kseg" style="flex:${k.duration}" title="${k.key.name}">` +
					`<div class="kn">${k.key.name}</div>` +
					`<div class="kt">${fmt(k.when)}s</div></div>`,
			)
			.join("");
		const chordBand = chords
			.map(
				(c) =>
					`<div class="cseg" style="flex:${c.duration}" title="${c.symbol}${c.degree ? " = " + c.degree : ""}">` +
					`<div class="cs">${c.symbol}</div>` +
					`<div class="cd">${c.degree ?? ""}</div>` +
					`<div class="ct">${fmt(c.when)}s</div></div>`,
			)
			.join("");

		// 詳細テーブル用の行 (rows) の作成
		const rows = chords
			.map((c) => {
				// このコードの開始時刻におけるキーを特定する
				const curKey = keys.find(k => k.when <= c.when && c.when < k.when + k.duration) || keys[0];
				const keyName = curKey ? curKey.key.name : "-";
				return `<tr>` +
					`<td class="time">${fmt(c.when)}s</td>` +
					`<td class="chord">${c.symbol}</td>` +
					`<td class="key">${keyName}</td>` +
					`<td class="degree">${c.degree ?? "-"}</td>` +
					`<td class="dur">${fmt(c.duration)}s</td>` +
					`</tr>`;
			})
			.join("");

		progOut.innerHTML =
			`<div class="tl-label">キー領域（転調検出）</div>` +
			`<div class="band-wrapper"><div class="band" style="width:${bandWidth}px">${keyBand}</div></div>` +
			`<div class="tl-label">コード進行（ローマ数字 = キーに対する度数）</div>` +
			`<div class="band-wrapper"><div class="band" style="width:${bandWidth}px">${chordBand}</div></div>` +
			`<div class="tl-label">推定コード詳細リスト</div>` +
			`<div class="detail-table-wrapper">` +
			`<table class="detail-table">` +
			`<thead><tr><th>開始時間</th><th>コード</th><th>キー</th><th>度数</th><th>長さ</th></tr></thead>` +
			`<tbody>${rows}</tbody>` +
			`</table>` +
			`</div>`;
	}

	// notes(TimedNote[]) を解析。1小節未満の細かなキーのちらつきは平滑化する。
	function analyze(notes, bpm) {
		const bar = (60 / bpm) * 4;
		return detectProgression(notes, { bpm, minSegmentDuration: bar });
	}

	// テキストのコード進行から
	function runText() {
		const bpm = Number(bpmIn.value) || 120;
		try {
			const notes = chordEventsToNotes(parseChords(progIn.value, bpm));
			renderTimeline(analyze(notes, bpm));
		} catch (e) {
			progOut.innerHTML = `<span class="err">${e.message.split("\n")[0]}</span>`;
		}
	}
	progIn.addEventListener("input", runText);
	bpmIn.addEventListener("input", runText);
	for (const s of [
		"C | G | Am | F | C | G | F | C | C | G | Am | F | C | G | F | C",
		"CM7 | Am7 | Dm7 | G7 | CM7 | Am7 | Dm7 | G7",
		"C | E7 | Am | C7 | F | Fm | C | G7 | C | E7 | Am | C7 | F | Fm | C | G7",
		"C | G | Am | F | C | G | Am | F | E | B | C#m | A | E | B | C#m | A",
	]) {
		const c = document.createElement("span");
		c.className = "chip";
		c.textContent = s.length > 28 ? s.slice(0, 27) + "…" : s;
		c.title = s;
		c.onclick = () => { progIn.value = s; runText(); };
		document.getElementById("progChips").appendChild(c);
	}

	// MIDIファイルから
	function loadMidi(file) {
		if (!file) return;
		const reader = new FileReader();
		reader.onload = () => {
			try {
				const { notes, bpm } = parseMidi(reader.result);
				if (!notes.length) throw new Error("ノートが見つかりませんでした");
				const dur = Math.max(...notes.map((n) => n.when + n.duration));
				midiLabel.textContent = file.name;
				midiInfo.innerHTML =
					`<code>${notes.length}</code> ノート / ` +
					`長さ <code>${fmt(dur)}s</code> / テンポ <code>${bpm}</code> BPM`;
				renderTimeline(analyze(notes, bpm));
			} catch (e) {
				midiInfo.innerHTML = `<span class="err">${e.message}</span>`;
			}
		};
		reader.onerror = () => { midiInfo.innerHTML = `<span class="err">読み込みに失敗しました</span>`; };
		reader.readAsArrayBuffer(file);
	}
	midiIn.addEventListener("change", () => loadMidi(midiIn.files[0]));
	for (const ev of ["dragenter", "dragover"])
		midiDrop.addEventListener(ev, (e) => { e.preventDefault(); midiDrop.classList.add("over"); });
	for (const ev of ["dragleave", "drop"])
		midiDrop.addEventListener(ev, (e) => { e.preventDefault(); midiDrop.classList.remove("over"); });
	midiDrop.addEventListener("drop", (e) => loadMidi(e.dataTransfer.files[0]));

	runA();
	runB();
	runText();
</script>
</body>
</html>
